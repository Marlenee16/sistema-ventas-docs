site_name: Sistema de Ventas Simple
site_description: Documentación de un sistema básico de ventas creado con MkDocs
site_author: Marlene

theme:
  name: material
  language: es
  logo: img/ventas.png
  favicon: img/ventas.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
  features:
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

nav:
  - Inicio: index.md
  - Instalación: instalacion.md
  - Uso del sistema: uso.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true

plugins:
  - search